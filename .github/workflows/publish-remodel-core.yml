name: Publish remodel-core

on:
  workflow_dispatch:
  push:
    tags:
      - "remodel-core-v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: RemodelCore
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Verify tag matches crate version
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          crate_version="$(cargo pkgid | sed 's/.*#//')"
          tag_version="${GITHUB_REF_NAME#remodel-core-v}"
          if [[ "$crate_version" != "$tag_version" ]]; then
            echo "Tag version ($tag_version) does not match Cargo.toml version ($crate_version)."
            exit 1
          fi

      - name: Run tests
        run: cargo test --locked

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --locked
